<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Person Profiler</title>

    <link rel="stylesheet" href="src/css/bootstrap.min.css">
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
    <div class="container">
        <div class="banner">
            <h1 class="display">Person Profiler</h1>
            <p class="leadmuted">Quickly look up a person from the built-in list.</p>
            <p class="small">Enter a full name (for example: Drake)</p>
        </div>

        <div class="finder">
            <input type="text" id="query" class="formcontrol" placeholder="Enter person name">
            <button id="findbtn" class=" btnprimary ">Search</button>
        </div>

        <div id="output"></div>
    </div>
    <script src="src/js/bootstrap.min.js"></script>
    <script src="src/js/script.js"></script>
</body>
</html>
